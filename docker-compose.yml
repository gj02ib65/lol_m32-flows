services:
  m32-sync:
    image: ghcr.io/gj02ib65/lol_m32-utility:latest
    container_name: m32-sync-utility
    restart: always
    # host networking is required for zero-latency UDP communication with the M32 consoles.
    # When network_mode is "host" the container shares the host network stack directly.
    # No ports: mapping is needed or used in this mode.
    network_mode: "host"
    volumes:
      - m32_church_data:/data
      # Mount this repo directory as the flows source (read-only).
      # The startup entrypoint in the image copies flows.json into /data/ at container start.
      # Because docker-compose.yml lives IN the m32-flows repo, "." is the repo root.
      - .:/opt/m32-flows-src:ro
    environment:
      - TZ=America/Chicago
      - NODE_RED_ENABLE_PROJECTS=false
      - CONFIG_FILE_PATH=/data/mixer_config.json
    # Loads the custom settings file so Node-RED finds the installed palette nodes.
    command: --settings /opt/m32-logic/settings.js

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    security_opt:
      - label=disable # Required for Podman to allow socket access
    volumes:
      # Rootless Podman on Windows exposes its socket as a named pipe.
      # If Watchtower fails to connect, run: podman machine inspect
      # and look for the socket path to use here.
      - //./pipe/podman-machine-default:/var/run/docker.sock
    # Check for image updates every Monday at 3 AM
    command: --schedule "0 0 3 * * 1" --cleanup m32-sync-utility

volumes:
  m32_church_data:
