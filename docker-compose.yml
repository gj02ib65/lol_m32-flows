services:
  m32-sync:
    image: ghcr.io/gj02ib65/lol_m32-utility:latest
    container_name: m32-sync-utility
    restart: always
    # host networking is required for zero-latency UDP communication with the M32 consoles.
    # When network_mode is "host" the container shares the host network stack directly.
    # No ports: mapping is needed or used in this mode.
    network_mode: "host"
    volumes:
      - m32_church_data:/data
      # This repo directory is mounted read-only as the flows source.
      # The container's startup script copies flows.json into /data/ at start.
      - .:/opt/m32-flows-src:ro
    environment:
      - TZ=America/Chicago
      - NODE_RED_ENABLE_PROJECTS=false
      - CONFIG_FILE_PATH=/data/mixer_config.json
    # Loads the custom settings file so Node-RED finds the installed palette nodes.
    command: --settings /opt/m32-logic/settings.js

volumes:
  m32_church_data:
